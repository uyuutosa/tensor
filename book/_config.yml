# Jupyter Book configuration for the tensor project.
# See https://jupyterbook.org/customize/config.html for the full reference.

title: tensor — named-axis tensor algebra in modern C++
author: uyuutosa
copyright: "2026"
logo: ""

# Where to find content. Notebooks live in ../tutorials/; the TOC
# imports them via relative paths.
only_build_toc_files: true

# Execute notebooks at build time. Set to "off" until xeus-cling is
# installed on the GitHub Actions runner; see deploy-book.yml.
execute:
  execute_notebooks: "off"
  timeout: 180

# Bibliography file. sphinxcontrib-bibtex (pulled in transitively by
# Jupyter Book) requires a non-empty list, so we point at references.bib
# which is intentionally empty (the project's bibliography lives in the
# ADR sequence per ADR-0015, not here).
bibtex_bibfiles:
  - references.bib

# Repository link integration.
repository:
  url: https://github.com/uyuutosa/tensor
  branch: develop
  path_to_book: book

# HTML theme + interactive features.
html:
  use_issues_button: true
  use_repository_button: true
  use_edit_page_button: true
  favicon: ""
  baseurl: ""

# Sphinx options (Jupyter Book wraps Sphinx).
sphinx:
  extra_extensions:
    - sphinx.ext.autodoc
    - sphinx.ext.napoleon
  config:
    html_show_copyright: false
    nb_execution_show_tb: true
    # ── LaTeX / PDF artifact (Phase 7a M2) ─────────────────────────
    # PDF builds run in CI on tag push (see deploy-book.yml) and
    # ship as a release artifact (`tensor-named-axis-<version>.pdf`).
    # Local devs with TeX Live can run:
    #
    #   jupyter-book build book --builder pdflatex
    #
    # which produces `book/_build/latex/tensor-named-axis.pdf`.
    # See `docs/user-manual/explanation/pdf-export.md` for what's
    # inside the artifact and how to cite it.
    latex_engine: pdflatex
    latex_elements:
      papersize: a4paper
      pointsize: 11pt

# Filename of the LaTeX/PDF output. Picked up by Jupyter Book's
# LaTeX-builder logic when `builder: pdflatex` is requested.
latex:
  latex_documents:
    targetname: tensor-named-axis.tex
