name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli:
    name: cli — typecheck + smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Sync template/ from repo root into cli/
        run: bun run sync-template

      - name: Smoke test — minimal profile
        run: |
          rm -rf /tmp/smoke-min
          bun run src/index.ts init /tmp/smoke-min --profile=minimal --ai=generic --name="CI Smoke (minimal)"
          test -f /tmp/smoke-min/docs/WORKFLOW.md
          test -f /tmp/smoke-min/docs/arc42/09-decisions/README.md
          test -f /tmp/smoke-min/docs/templates/5_adr.md
          test ! -d /tmp/smoke-min/docs/user-manual
          test ! -d /tmp/smoke-min/.claude

      - name: Smoke test — standard profile + claude hook
        run: |
          rm -rf /tmp/smoke-std
          bun run src/index.ts init /tmp/smoke-std --profile=standard --ai=claude --name="CI Smoke (standard)"
          test -f /tmp/smoke-std/docs/diagrams/c4/workspace.dsl
          test -f /tmp/smoke-std/docs/detailed-design/README.md
          test -f /tmp/smoke-std/.claude/rules/documentation.md
          ! grep -q '<placeholder>' /tmp/smoke-std/docs/WORKFLOW.md

      - name: Smoke test — full profile
        run: |
          rm -rf /tmp/smoke-full
          bun run src/index.ts init /tmp/smoke-full --profile=full --ai=cursor --name="CI Smoke (full)"
          test -d /tmp/smoke-full/docs/user-manual/tutorials
          test -d /tmp/smoke-full/docs/user-manual/how-to
          test -d /tmp/smoke-full/docs/user-manual/reference
          test -d /tmp/smoke-full/docs/user-manual/explanation
          test -d /tmp/smoke-full/docs/cost-estimates
          test -f /tmp/smoke-full/.cursor/rules/docs.md

      - name: Smoke test — add command
        run: |
          rm -rf /tmp/smoke-add
          bun run src/index.ts init /tmp/smoke-add --profile=minimal --ai=generic
          bun run src/index.ts add user-manual /tmp/smoke-add
          test -f /tmp/smoke-add/docs/user-manual/README.md
          # Re-running add should skip existing files
          OUT=$(bun run src/index.ts add user-manual /tmp/smoke-add)
          echo "$OUT" | grep -q '0 files written'

      - name: Smoke test — --include override
        run: |
          rm -rf /tmp/smoke-inc
          bun run src/index.ts init /tmp/smoke-inc --include=arc42,templates --ai=generic
          test -d /tmp/smoke-inc/docs/arc42
          test -d /tmp/smoke-inc/docs/templates
          test ! -d /tmp/smoke-inc/docs/detailed-design
          test ! -d /tmp/smoke-inc/docs/user-manual

      - name: Smoke test — --dry-run produces no files
        run: |
          rm -rf /tmp/smoke-dry
          bun run src/index.ts init /tmp/smoke-dry --profile=full --ai=claude --dry-run
          test ! -d /tmp/smoke-dry

      - name: npm pack — verify tarball includes template/
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.log
          grep -q 'template/docs/WORKFLOW.md' /tmp/pack.log
          grep -q 'template/docs/arc42/09-decisions/README.md' /tmp/pack.log
          grep -q 'template/docs/templates/5_adr.md' /tmp/pack.log
