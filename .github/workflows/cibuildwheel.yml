name: Build wheels + publish to PyPI

# Multi-platform wheel build for the Python SDK + tag-triggered PyPI
# publish. Single workflow because cross-workflow artefact sharing is
# fiddly; the build_* jobs upload wheels as workflow artefacts, and
# publish_to_pypi gates on tag-push + downloads them in the same run.
#
# Platforms:
#   - Linux x86_64 (ubuntu-latest, manylinux2014)
#   - macOS x86_64 (macos-13)
#   - macOS arm64  (macos-14 / Apple Silicon)
#   - Windows x86_64 (windows-latest, MSVC)
# CPython 3.9 – 3.13.
#
# Triggers:
#   - manual dispatch (smoke-test the matrix before tagging)
#   - on tag matching v* or semver-like — feeds publish_to_pypi
#
# Trusted publishing (OIDC) is used for the PyPI upload — the maintainer
# must enable the trusted-publisher policy on the PyPI project page
# (PyPI → tensor-named-axis → Settings → Publishing → Add → GitHub →
# uyuutosa/tensor + workflow file `cibuildwheel.yml`) before the first
# tag-triggered upload succeeds.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: read

jobs:
  build_wheels:
    name: ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: macos-13
            arch: x86_64
          - os: macos-14
            arch: arm64
          - os: windows-latest
            arch: AMD64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (orchestration only)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          # CPython 3.9 – 3.13; skip PyPy, musllinux, 32-bit.
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"
          # Verbose build so failures point at the offending compile.
          CIBW_BUILD_VERBOSITY: 1
          # Smoke: import the wheel + call hello() to verify the
          # nanobind extension is actually loaded.
          CIBW_TEST_COMMAND: 'python -c "import tensor; print(tensor.__version__); assert tensor.hello() == \"hello from tensor::core\""'

      - name: Upload wheels as workflow artefact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist as workflow artefact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  publish_to_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Only on tag pushes — manual dispatches build but do not publish
    # (the artefacts are inspectable on the workflow run page).
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write   # required for PyPA trusted publishing (OIDC)
    environment:
      name: pypi
      url: https://pypi.org/p/tensor-named-axis
    steps:
      - name: Download all wheels + sdist
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: List artefacts (sanity)
        run: ls -la ./dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ./dist
          skip-existing: true
          verbose: true
