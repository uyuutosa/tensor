name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu — GCC 11 (C++20 baseline minimum)
          - os: ubuntu-22.04
            compiler: gcc-11
            preset: debug-werror
            cc: gcc-11
            cxx: g++-11
          - os: ubuntu-22.04
            compiler: gcc-11
            preset: release-werror
            cc: gcc-11
            cxx: g++-11
          # Ubuntu — Clang 13
          - os: ubuntu-22.04
            compiler: clang-13
            preset: debug-werror
            cc: clang-13
            cxx: clang++-13
          - os: ubuntu-22.04
            compiler: clang-13
            preset: release-werror
            cc: clang-13
            cxx: clang++-13
          # macOS — system Clang
          - os: macos-14
            compiler: appleclang
            preset: debug-werror
          - os: macos-14
            compiler: appleclang
            preset: release-werror
          # Windows — MSVC 19.30+
          - os: windows-2022
            compiler: msvc
            preset: debug-werror
          - os: windows-2022
            compiler: msvc
            preset: release-werror

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux compilers and Ninja
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          if [[ "${{ matrix.compiler }}" == gcc-11 ]]; then
            sudo apt-get install -y gcc-11 g++-11
          elif [[ "${{ matrix.compiler }}" == clang-13 ]]; then
            sudo apt-get install -y clang-13
          fi

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: choco install ninja -y

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            git clone --depth=1 https://github.com/microsoft/vcpkg "$RUNNER_TEMP/vcpkg"
            "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
            echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"
          else
            git clone --depth=1 https://github.com/microsoft/vcpkg "$RUNNER_TEMP/vcpkg"
            "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
            echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"
          fi
          mkdir -p "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}"

      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ matrix.os }}-${{ matrix.compiler }}-${{ hashFiles('vcpkg.json') }}

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset=${{ matrix.preset }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake --preset=${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset=${{ matrix.preset }}

      - name: Test
        run: ctest --preset=${{ matrix.preset }}
