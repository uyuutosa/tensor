name: Deploy Jupyter Book

# Trigger on every push to develop (and main once 0.1.0 ships).
on:
  push:
    branches: [develop, main]
  workflow_dispatch:

# Permissions required for the deploy step (GitHub Pages).
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deploy at a time; cancel any prior queued one.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Jupyter Book
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupyter-book

      - name: Build the book
        # Use the repository root so the TOC's `../tutorials/...` paths
        # resolve. Jupyter Book writes _build/html under the supplied path.
        run: jupyter-book build book

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
