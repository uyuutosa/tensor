name: Deploy Jupyter Book

# Trigger on every push to develop (and main once 0.1.0 ships).
on:
  push:
    branches: [develop, main]
  workflow_dispatch:

# Permissions required for the deploy step (GitHub Pages).
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deploy at a time; cancel any prior queued one.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Jupyter Book
        # Pin to the classic 0.15.x line. The project's book/_toc.yml uses
        # `format: jb-book` (classic CFG) which jupyter-book 2.x (MyST-MD
        # rewrite) does not parse — picking up jupyter-book 2.x silently via
        # `pip install jupyter-book` fails at build with
        # "EISDIR: illegal operation on a directory, read" + "No file exports
        # found." Re-evaluate the 2.x migration after `0.1.0` ship.
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'jupyter-book>=0.15,<1'

      - name: Stage external content under book/
        # Creates symlinks book/{tutorials,python,docs} -> ../<same>
        # so Sphinx (source root = book/) can resolve _toc.yml chapter
        # paths into the project's actual notebook + report locations.
        # Without this, every chapter outside book/ silently 404s on
        # the deployed site (etoc.ref "nonexisting document" warning).
        run: bash book/stage.sh

      # ─── C++ tutorial execution (xeus-cpp) ───────────────────────
      # Same bug class PR #117 fixed for Python notebooks: committed
      # `execution_count: None` tutorials render source-only on the
      # site. Python notebooks are committed pre-executed (per
      # `python-notebook-authoring.md`); the C++ tutorials can't
      # easily follow the same pattern because xeus-cpp isn't
      # universally installable. Solution: install xeus-cpp here in
      # CI and execute the tutorials in-place before
      # `jupyter-book build`, so the deploy always renders with
      # outputs even when the committed tutorial has none.
      #
      # `continue-on-error: true` because xeus-cpp is R-S2 (R-rated
      # Medium): a flaky xeus-cpp upgrade should not block deploys —
      # the fallback is the existing source-only render (current
      # state, no worse than today).
      - name: Set up Miniconda (for xeus-cpp)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          auto-activate-base: true
          activate-environment: ""
        continue-on-error: true

      - name: Install xeus-cpp via conda-forge
        shell: bash -l {0}
        continue-on-error: true
        run: |
          conda create -n xcpp -c conda-forge -y \
              xeus-cpp jupyter nbconvert
          conda init bash

      - name: Patch xcpp20 kernelspec with project header include path
        shell: bash -l {0}
        continue-on-error: true
        run: |
          # xeus-cpp uses Clang-Repl (not cling), so the legacy
          # `#pragma cling add_include_path("../include")` at the top
          # of every tutorial is silently ignored. The xeus-cpp
          # equivalent is passing `-I/path/to/include` as a clang
          # flag at kernel-launch time, which means injecting it into
          # the kernelspec's `argv` array.
          conda activate xcpp
          python - <<PY
          import json, os, subprocess, sys
          out = subprocess.check_output(
              ["jupyter", "kernelspec", "list", "--json"], text=True)
          kernels = json.loads(out)["kernelspecs"]
          if "xcpp20" not in kernels:
              print("::warning::xcpp20 kernelspec not found; skipping patch")
              sys.exit(0)
          kjson = os.path.join(kernels["xcpp20"]["resource_dir"], "kernel.json")
          with open(kjson) as f:
              spec = json.load(f)
          include_arg = f"-I{os.environ['GITHUB_WORKSPACE']}/include"
          if include_arg not in spec["argv"]:
              spec["argv"].append(include_arg)
          with open(kjson, "w") as f:
              json.dump(spec, f, indent=2)
          print("Patched kernel.json argv:", spec["argv"])
          PY

      - name: Execute C++ tutorials in place
        shell: bash -l {0}
        continue-on-error: true
        run: |
          # Activate the xcpp env then execute every tutorial. Per
          # ADR-0014 §3, the canonical kernel is `xcpp20`. If any
          # tutorial fails (e.g. xeus-cpp / Clang-Repl regression),
          # `continue-on-error: true` keeps the deploy moving — the
          # tutorial just renders source-only as it does today.
          conda activate xcpp
          for nb in tutorials/*.ipynb; do
            echo "::group::executing ${nb}"
            jupyter nbconvert --to notebook --inplace --execute \
                              --ExecutePreprocessor.timeout=180 \
                              --ExecutePreprocessor.kernel_name=xcpp20 \
                              "${nb}" || \
                echo "::warning::${nb} did not execute cleanly; falling back to source-only render"
            echo "::endgroup::"
          done

      - name: Build the book
        # Source root is book/; with the symlinks above, the TOC's
        # tutorials/, python/notebooks/, docs/reports/ paths all
        # resolve. Jupyter Book writes _build/html under book/. The
        # C++ tutorials are executed in-place by the xeus-cpp step
        # above (best-effort); the Python notebooks are already
        # committed pre-executed per the notebook-output gate.
        run: jupyter-book build book

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/_build/html

      # ── PDF artifact (Phase 7a M2) ────────────────────────────────
      # Builds `book/_build/latex/tensor-named-axis.pdf` via Sphinx's
      # PDF-via-LaTeX builder. TeX Live is ~5 GB on a cold runner;
      # to limit blast radius the PDF build runs only on
      # `workflow_dispatch` + tag push, not on every develop push.
      # `continue-on-error: true` keeps the HTML deploy alive even if
      # the LaTeX toolchain breaks (R-P7a.1 per the impl-plan).
      - name: Install TeX Live (PDF build)
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        # `texlive-fonts-extra` ships `bbm.sty` (blackboard-bold) +
        # many other math-mode fonts Sphinx's MyST math rendering
        # pulls in. `texlive-science` covers physics, mathtools, and
        # other Sphinx math packages. `fonts-freefont-otf` provides
        # FreeSerif/FreeMono/FreeSans, which sphinx-jupyterbook-latex
        # selects through fontspec when its default engine=xelatex
        # path is taken. Confirmed missing across the M2 smoke runs:
        #   1st (25897438571): bbm.sty not found
        #   2nd (25897590644): fontspec error — FreeSerif not found
        run: |
          sudo apt-get install -y --no-install-recommends \
              texlive-latex-recommended \
              texlive-latex-extra \
              texlive-fonts-recommended \
              texlive-fonts-extra \
              texlive-science \
              texlive-xetex \
              fonts-freefont-otf \
              latexmk

      - name: Build PDF artifact
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        # `jupyter-book build book --builder pdflatex` runs Sphinx's
        # LaTeX builder (configured in book/_config.yml) and then
        # invokes `make` inside `book/_build/latex/` to produce the
        # PDF. Skipping on push-to-develop keeps the HTML-only
        # deploys fast (~6 min vs ~25 min for the PDF build).
        run: |
          jupyter-book build book --builder pdflatex
          ls -lah book/_build/latex/*.pdf

      - name: Upload PDF artifact
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: tensor-named-axis-pdf
          path: book/_build/latex/tensor-named-axis.pdf
          retention-days: 90
          if-no-files-found: warn

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
